name: Deploy

on:
  workflow_run:
    workflows: [Docker]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            docker pull ghcr.io/vidalee/kasoku:$IMAGE_TAG
            docker stop kasoku || true
            docker rm kasoku || true
            docker run -d \
              --name kasoku \
              --restart unless-stopped \
              -p 4351:3000 \
              -v /opt/kasoku:/data \
              -e DATABASE_PATH=/data/kasoku.db \
              -e AUTH_PASSWORD_HASH='${{ secrets.AUTH_PASSWORD_HASH }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              ghcr.io/vidalee/kasoku:$IMAGE_TAG
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_branch }}
