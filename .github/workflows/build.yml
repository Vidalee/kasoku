name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          DATABASE_PATH: /tmp/kasoku.db
          AUTH_PASSWORD_HASH: ${{ secrets.AUTH_PASSWORD_HASH || '$2b$12$placeholder000000000000000000000000000000000000000000' }}
          JWT_SECRET: placeholder-secret-for-build
